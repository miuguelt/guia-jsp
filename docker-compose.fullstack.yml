version: '3.8'

# =========================================================================
# Full Stack: PostgreSQL + FastAPI + React
# =========================================================================
# Levanta todo el stack moderno con un solo comando.
# Alternativa Docker a la ejecución nativa en Windows.
#
# Uso:
#   docker compose -f docker-compose.fullstack.yml up -d
#   docker compose -f docker-compose.fullstack.yml down
# =========================================================================

services:
  # ===== Base de datos =====
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventario_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sena_adso_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./recursos/sql/inventario_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventario_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fullstack-net

  # ===== Backend FastAPI =====
  api:
    build:
      context: ./recursos/fastapi-inventario
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:sena_adso_2026@db:5432/inventario_db
      SECRET_KEY: sena-adso-jwt-secret-key-2026
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fullstack-net

  # ===== Frontend React (producción con Nginx) =====
  frontend:
    build:
      context: ./recursos/frontend-inventario
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - fullstack-net

  # ===== Frontend Flutter Web (producción con Nginx) =====
  flutter:
    build:
      context: ./recursos/flutter-inventario
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      API_BASE_URL: http://api:8000/api
    depends_on:
      - api
    networks:
      - fullstack-net

volumes:
  pgdata:

networks:
  fullstack-net:
    driver: bridge
