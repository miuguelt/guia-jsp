# =============================================================================
# Configuración de Nginx para Flutter Web (SPA)
# =============================================================================
# Sirve los archivos estáticos compilados de Flutter web con:
# - Compresión gzip para reducir el ancho de banda
# - Cacheo agresivo de activos inmutables (JS/CSS con hash)
# - Redirección de todas las rutas a index.html (SPA routing)
# =============================================================================

server {
    # Puerto de escucha
    listen 80;
    server_name localhost;

    # Raíz del servidor web
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------------
    # Compresión gzip
    # -------------------------------------------------------------------------
    gzip on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_vary on;
    gzip_proxied any;
    gzip_disable "msie6";

    # -------------------------------------------------------------------------
    # Regla principal — SPA routing
    # -------------------------------------------------------------------------
    # Cualquier ruta que no coincida con un archivo real se redirige a
    # index.html para que Flutter (GoRouter) maneje la navegación.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------------------
    # Archivos estáticos con hash (JS, CSS, fuentes, imágenes)
    # -------------------------------------------------------------------------
    # Flutter genera nombres de archivo con hash en el build de producción.
    # Estos son inmutables y se pueden cachear por largos periodos.
    location ~* \.(?:js|css|map|json|ico|png|jpg|jpeg|gif|webp|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        access_log off;
    }

    # -------------------------------------------------------------------------
    # Negar acceso a archivos ocultos
    # -------------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # -------------------------------------------------------------------------
    # Headers de seguridad adicionales
    # -------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
