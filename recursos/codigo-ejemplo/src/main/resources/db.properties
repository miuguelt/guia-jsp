# ============================================
# CONFIGURACIÓN DE BASE DE DATOS
# Sistema de Inventario - SENA ADSO
# ============================================
# ⚠️  Repositorio público — usar SOLO defaults locales
# ⚠️  NUNCA poner credenciales reales aquí
#
# Prioridad (ConexionDB.java):
#   1. DATABASE_URL (env var — Coolify / Docker)
#   2. DB_HOST + DB_PORT + DB_NAME + DB_USER + DB_PASSWORD (env vars)
#   3. db.properties (fallback local — este archivo)
# ============================================

# Configuración de conexión a PostgreSQL
db.driver=org.postgresql.Driver
db.url=jdbc:postgresql://localhost:5432/inventario_db
db.username=postgres
db.password=postgres

# Configuración del pool de conexiones (opcional)
db.pool.initialSize=5
db.pool.maxSize=20
db.pool.timeout=30000
