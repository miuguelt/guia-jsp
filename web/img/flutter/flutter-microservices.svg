<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8faf9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f0f4f2;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowRight" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00664a"/>
    </marker>
  </defs>

  <rect width="900" height="520" rx="12" fill="url(#bgGrad)" stroke="#e0e8e4" stroke-width="1"/>
  <rect x="0" y="0" width="900" height="44" rx="12" fill="#00664a"/>
  <rect x="0" y="22" width="900" height="22" fill="#00664a"/>
  <text x="450" y="29" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Arquitectura de Microservicios con Flutter + OpenAPI</text>

  <!-- Flutter App -->
  <rect x="30" y="65" width="220" height="360" rx="12" fill="#e0f2fe" stroke="#1389FD" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="90" text-anchor="middle" fill="#0369a1" font-size="14" font-weight="700">📱 App Flutter</text>
  
  <!-- UI Layer -->
  <rect x="42" y="105" width="196" height="28" rx="4" fill="#7dd3fc" stroke="#38bdf8" stroke-width="1"/>
  <text x="140" y="124" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="600">UI Layer (Widgets)</text>
  
  <!-- State Management -->
  <rect x="42" y="140" width="196" height="28" rx="4" fill="#f0abfc" stroke="#e879f9" stroke-width="1"/>
  <text x="140" y="159" text-anchor="middle" fill="#86198f" font-size="10" font-weight="600">State Management (Riverpod)</text>

  <!-- Service Layer -->
  <rect x="42" y="175" width="196" height="28" rx="4" fill="#fde68a" stroke="#f59e0b" stroke-width="1"/>
  <text x="140" y="194" text-anchor="middle" fill="#b45309" font-size="10" font-weight="600">Service Layer (Casos de Uso)</text>

  <!-- Repository Layer -->
  <rect x="42" y="210" width="196" height="28" rx="4" fill="#a7f3d0" stroke="#34d399" stroke-width="1"/>
  <text x="140" y="229" text-anchor="middle" fill="#065f46" font-size="10" font-weight="600">Repository Layer (Abstracción)</text>

  <!-- Data Sources -->
  <rect x="42" y="245" width="196" height="50" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="140" y="265" text-anchor="middle" fill="#4338ca" font-size="10" font-weight="600">Data Sources</text>
  <text x="140" y="282" text-anchor="middle" fill="#6366f1" font-size="8">OpenAPI Client ← http/dio</text>

  <!-- API Gateway -->
  <rect x="300" y="65" width="260" height="200" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="430" y="90" text-anchor="middle" fill="#b45309" font-size="14" font-weight="700">🌐 API Gateway</text>
  <rect x="312" y="105" width="236" height="28" rx="4" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
  <text x="430" y="124" text-anchor="middle" fill="#92400e" font-size="10" font-weight="600">Enrutamiento / Autenticación / Rate Limiting</text>
  <rect x="312" y="140" width="236" height="28" rx="4" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
  <text x="430" y="159" text-anchor="middle" fill="#92400e" font-size="10" font-weight="600">OpenAPI Spec Unificada</text>
  <rect x="312" y="175" width="236" height="28" rx="4" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
  <text x="430" y="194" text-anchor="middle" fill="#92400e" font-size="10" font-weight="600">Load Balancer (Round Robin)</text>
  <rect x="312" y="210" width="236" height="28" rx="4" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
  <text x="430" y="229" text-anchor="middle" fill="#92400e" font-size="10" font-weight="600">CORS / JWT Validation</text>

  <!-- Microservices -->
  <rect x="620" y="65" width="250" height="90" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="745" y="85" text-anchor="middle" fill="#065f46" font-size="11" font-weight="700">🔐 Auth Service</text>
  <text x="745" y="102" text-anchor="middle" fill="#047857" font-size="9">POST /api/auth/login</text>
  <text x="745" y="116" text-anchor="middle" fill="#047857" font-size="9">POST /api/auth/register</text>
  <text x="745" y="130" text-anchor="middle" fill="#047857" font-size="9">GET /api/auth/me</text>
  <text x="745" y="144" text-anchor="middle" fill="#047857" font-size="9">Puerto: 8001</text>

  <rect x="620" y="170" width="250" height="90" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="745" y="190" text-anchor="middle" fill="#065f46" font-size="11" font-weight="700">📦 Products Service</text>
  <text x="745" y="207" text-anchor="middle" fill="#047857" font-size="9">GET /api/productos</text>
  <text x="745" y="221" text-anchor="middle" fill="#047857" font-size="9">POST /api/productos</text>
  <text x="745" y="235" text-anchor="middle" fill="#047857" font-size="9">PUT /api/productos/{id}</text>
  <text x="745" y="249" text-anchor="middle" fill="#047857" font-size="9">Puerto: 8002</text>

  <rect x="620" y="275" width="250" height="90" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="745" y="295" text-anchor="middle" fill="#065f46" font-size="11" font-weight="700">👥 Users Service</text>
  <text x="745" y="312" text-anchor="middle" fill="#047857" font-size="9">GET /api/usuarios</text>
  <text x="745" y="326" text-anchor="middle" fill="#047857" font-size="9">POST /api/usuarios</text>
  <text x="745" y="340" text-anchor="middle" fill="#047857" font-size="9">PUT /api/usuarios/{id}</text>
  <text x="745" y="354" text-anchor="middle" fill="#047857" font-size="9">Puerto: 8003</text>

  <!-- Databases per service -->
  <rect x="630" y="380" width="100" height="40" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="680" y="398" text-anchor="middle" fill="#991b1b" font-size="8" font-weight="600">DB Auth</text>
  <text x="680" y="410" text-anchor="middle" fill="#b91c1c" font-size="7">PostgreSQL</text>

  <rect x="740" y="380" width="100" height="40" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="790" y="398" text-anchor="middle" fill="#991b1b" font-size="8" font-weight="600">DB Products</text>
  <text x="790" y="410" text-anchor="middle" fill="#b91c1c" font-size="7">PostgreSQL</text>

  <rect x="870" y="380" width="100" height="40" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="920" y="398" text-anchor="middle" fill="#991b1b" font-size="8" font-weight="600">DB Users</text>
  <text x="920" y="410" text-anchor="middle" fill="#b91c1c" font-size="7">PostgreSQL</text>

  <!-- Docker Bottom -->
  <rect x="30" y="315" width="220" height="200" rx="12" fill="#f0f4ff" stroke="#4f46e5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="338" text-anchor="middle" fill="#4338ca" font-size="13" font-weight="700">🐳 Docker Compose</text>
  
  <rect x="42" y="352" width="196" height="22" rx="4" fill="#e0e7ff" stroke="#818cf8" stroke-width="1"/>
  <text x="140" y="367" text-anchor="middle" fill="#4338ca" font-size="8">docker-compose.microservices.yml</text>

  <rect x="42" y="382" width="196" height="18" rx="4" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="140" y="395" text-anchor="middle" fill="#1e40af" font-size="8">Red: microservices-net</text>

  <rect x="42" y="408" width="63" height="30" rx="4" fill="#fecaca" stroke="#f87171" stroke-width="1"/>
  <text x="73" y="427" text-anchor="middle" fill="#991b1b" font-size="8">auth-svc</text>
  <rect x="110" y="408" width="63" height="30" rx="4" fill="#fecaca" stroke="#f87171" stroke-width="1"/>
  <text x="141" y="427" text-anchor="middle" fill="#991b1b" font-size="8">products-svc</text>
  <rect x="178" y="408" width="60" height="30" rx="4" fill="#fecaca" stroke="#f87171" stroke-width="1"/>
  <text x="208" y="427" text-anchor="middle" fill="#991b1b" font-size="8">users-svc</text>

  <rect x="42" y="446" width="196" height="28" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="140" y="465" text-anchor="middle" fill="#b45309" font-size="9">openapi-generator → Código Dart</text>

  <rect x="42" y="482" width="196" height="24" rx="4" fill="#d1fae5" stroke="#34d399" stroke-width="1"/>
  <text x="140" y="498" text-anchor="middle" fill="#065f46" font-size="8">Modular, escalable, desacoplado</text>

  <!-- Arrows from Flutter to API Gateway -->
  <line x1="250" y1="110" x2="298" y2="110" stroke="#1389FD" stroke-width="2" marker-end="url(#arrowRight)"/>
  <line x1="250" y1="160" x2="298" y2="160" stroke="#1389FD" stroke-width="2" marker-end="url(#arrowRight)"/>
  <line x1="250" y1="210" x2="298" y2="210" stroke="#1389FD" stroke-width="2" marker-end="url(#arrowRight)"/>

  <!-- Arrows from Gateway to Microservices -->
  <line x1="560" y1="100" x2="618" y2="100" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowRight)"/>
  <line x1="560" y1="200" x2="618" y2="200" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowRight)"/>
  <line x1="560" y1="300" x2="618" y2="300" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowRight)"/>

  <!-- Back arrows -->
  <line x1="618" y1="115" x2="560" y2="115" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="618" y1="215" x2="560" y2="215" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="618" y1="315" x2="560" y2="315" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Labels -->
  <text x="550" y="85" text-anchor="end" fill="#64748b" font-size="8">HTTP JSON</text>
  <text x="550" y="235" text-anchor="end" fill="#64748b" font-size="8">HTTP JSON</text>
  <text x="550" y="335" text-anchor="end" fill="#64748b" font-size="8">HTTP JSON</text>
</svg>