<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="Inter, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8faf9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f0f4f2;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="460" rx="12" fill="url(#bgGrad)" stroke="#e0e8e4" stroke-width="1"/>
  <rect x="0" y="0" width="800" height="44" rx="12" fill="#1389FD"/>
  <rect x="0" y="22" width="800" height="22" fill="#1389FD"/>
  <text x="400" y="29" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Árbol de Widgets — App de Inventario</text>

  <!-- MaterialApp -->
  <rect x="250" y="60" width="300" height="50" rx="10" fill="#f0f7ff" stroke="#0175C2" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="80" text-anchor="middle" fill="#0175C2" font-size="13" font-weight="700">MaterialApp</text>
  <text x="400" y="96" text-anchor="middle" fill="#0369a1" font-size="9">Tema, Rutas, Localizaciones</text>

  <!-- Arrows -->
  <line x1="400" y1="110" x2="400" y2="130" stroke="#0175C2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- MultiProvider -->
  <rect x="220" y="132" width="360" height="40" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="150" text-anchor="middle" fill="#6d28d9" font-size="11" font-weight="600">MultiProvider (Riverpod)</text>
  <text x="400" y="163" text-anchor="middle" fill="#8b5cf6" font-size="9">authProvider | productosProvider | usuariosProvider</text>

  <line x1="400" y1="172" x2="400" y2="192" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- Navigator -->
  <rect x="230" y="194" width="340" height="40" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="212" text-anchor="middle" fill="#b45309" font-size="11" font-weight="600">GoRouter / Navigator 2.0</text>
  <text x="400" y="225" text-anchor="middle" fill="#d97706" font-size="9">/login | /productos | /productos/:id | /usuarios</text>

  <!-- Three columns for routes -->
  <!-- Login -->
  <rect x="50" y="260" width="200" height="180" rx="10" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="270" width="180" height="28" rx="5" fill="#7dd3fc"/>
  <text x="150" y="289" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="700">LoginScreen</text>
  
  <rect x="60" y="306" width="180" height="22" rx="4" fill="#bae6fd"/>
  <text x="150" y="321" text-anchor="middle" fill="#0369a1" font-size="8">Scaffold</text>
  <rect x="60" y="334" width="180" height="22" rx="4" fill="#bae6fd"/>
  <text x="150" y="349" text-anchor="middle" fill="#0369a1" font-size="8">└─ SafeArea</text>
  <rect x="60" y="362" width="180" height="22" rx="4" fill="#bae6fd"/>
  <text x="150" y="377" text-anchor="middle" fill="#0369a1" font-size="8">   └─ Column</text>
  <rect x="60" y="390" width="180" height="22" rx="4" fill="#bae6fd"/>
  <text x="150" y="405" text-anchor="middle" fill="#0369a1" font-size="8">      ├─ TextField × 2</text>
  <rect x="60" y="418" width="180" height="16" rx="4" fill="#bae6fd"/>
  <text x="150" y="430" text-anchor="middle" fill="#0369a1" font-size="7">      └─ ElevatedButton</text>

  <!-- Productos List -->
  <rect x="300" y="260" width="200" height="180" rx="10" fill="#ecfdf5" stroke="#34d399" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="310" y="270" width="180" height="28" rx="5" fill="#6ee7b7"/>
  <text x="400" y="289" text-anchor="middle" fill="#065f46" font-size="10" font-weight="700">ProductosScreen</text>
  
  <rect x="310" y="306" width="180" height="22" rx="4" fill="#a7f3d0"/>
  <text x="400" y="321" text-anchor="middle" fill="#065f46" font-size="8">Scaffold</text>
  <rect x="310" y="334" width="180" height="22" rx="4" fill="#a7f3d0"/>
  <text x="400" y="349" text-anchor="middle" fill="#065f46" font-size="8">├─ AppBar (búsqueda)</text>
  <rect x="310" y="362" width="180" height="22" rx="4" fill="#a7f3d0"/>
  <text x="400" y="377" text-anchor="middle" fill="#065f46" font-size="8">├─ ProductoList</text>
  <rect x="310" y="390" width="180" height="22" rx="4" fill="#a7f3d0"/>
  <text x="400" y="405" text-anchor="middle" fill="#065f46" font-size="8">│  └─ ListView.builder</text>
  <rect x="310" y="418" width="180" height="16" rx="4" fill="#a7f3d0"/>
  <text x="400" y="430" text-anchor="middle" fill="#065f46" font-size="7">└─ FloatingActionButton</text>

  <!-- Producto Detail -->
  <rect x="550" y="260" width="200" height="180" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="560" y="270" width="180" height="28" rx="5" fill="#fcd34d"/>
  <text x="650" y="289" text-anchor="middle" fill="#92400e" font-size="10" font-weight="700">ProductoDetail</text>
  
  <rect x="560" y="306" width="180" height="22" rx="4" fill="#fde68a"/>
  <text x="650" y="321" text-anchor="middle" fill="#92400e" font-size="8">Scaffold</text>
  <rect x="560" y="334" width="180" height="22" rx="4" fill="#fde68a"/>
  <text x="650" y="349" text-anchor="middle" fill="#92400e" font-size="8">├─ AppBar</text>
  <rect x="560" y="362" width="180" height="22" rx="4" fill="#fde68a"/>
  <text x="650" y="377" text-anchor="middle" fill="#92400e" font-size="8">└─ Card (detalle)</text>
  <rect x="560" y="390" width="180" height="22" rx="4" fill="#fde68a"/>
  <text x="650" y="405" text-anchor="middle" fill="#92400e" font-size="8">   ├─ Text (nombre)</text>
  <rect x="560" y="418" width="180" height="16" rx="4" fill="#fde68a"/>
  <text x="650" y="430" text-anchor="middle" fill="#92400e" font-size="7">   └─ Row (editar/eliminar)</text>

  <!-- Arrows from Navigator -->
  <line x1="300" y1="234" x2="150" y2="258" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="400" y1="234" x2="400" y2="258" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="500" y1="234" x2="650" y2="258" stroke="#f59e0b" stroke-width="1.5"/>
</svg>