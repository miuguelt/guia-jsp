<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="100%" height="100%">
  <defs>
    <linearGradient id="flow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00664a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00896a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- Título -->
  <text x="500" y="40" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#1a2e28" text-anchor="middle">
    Flujo Completo de una Petición HTTP - CRUD Crear Producto
  </text>
  
  <!-- Paso 1: Usuario -->
  <g transform="translate(30, 80)">
    <rect x="0" y="0" width="160" height="110" rx="12" fill="#f0f4f2" stroke="#00664a" stroke-width="2" filter="url(#shadow3)"/>
    <circle cx="80" cy="38" r="18" fill="#00664a"/>
    <path d="M 60 63 Q 80 53 100 63" fill="#00664a"/>
    <text x="80" y="90" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1a2e28" text-anchor="middle">1. Usuario</text>
    <text x="80" y="103" font-family="Inter, sans-serif" font-size="10" fill="#6b7e78" text-anchor="middle">Llena formulario</text>
  </g>
  
  <!-- Flecha 1→2 -->
  <g>
    <line x1="190" y1="135" x2="240" y2="135" stroke="#00664a" stroke-width="2"/>
    <polygon points="240,135 230,130 230,140" fill="#00664a"/>
    <text x="215" y="125" font-family="Inter, sans-serif" font-size="11" fill="#6b7e78" text-anchor="middle">POST</text>
  </g>
  
  <!-- Paso 2: Vista JSP -->
  <g transform="translate(240, 80)">
    <rect x="0" y="0" width="160" height="110" rx="12" fill="#00664a" filter="url(#shadow3)"/>
    <text x="80" y="25" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">2. Vista JSP</text>
    <text x="80" y="45" font-family="JetBrains Mono, monospace" font-size="10.5" fill="rgba(255,255,255,0.8)" text-anchor="middle">formulario.jsp</text>
    <line x1="10" y1="55" x2="150" y2="55" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="80" y="75" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(255,255,255,0.95)" text-anchor="middle">&lt;form action="productos"</text>
    <text x="80" y="90" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(255,255,255,0.95)" text-anchor="middle">method="POST"&gt;</text>
  </g>
  
  <!-- Flecha 2→3 -->
  <g>
    <line x1="400" y1="135" x2="450" y2="135" stroke="#00664a" stroke-width="2"/>
    <polygon points="450,135 440,130 440,140" fill="#00664a"/>
    <text x="425" y="125" font-family="Inter, sans-serif" font-size="11" fill="#6b7e78" text-anchor="middle">params</text>
  </g>
  
  <!-- Paso 3: Controlador Servlet -->
  <g transform="translate(450, 80)">
    <rect x="0" y="0" width="160" height="110" rx="12" fill="#4a2c8a" filter="url(#shadow3)"/>
    <text x="80" y="25" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">3. Controlador</text>
    <text x="80" y="45" font-family="JetBrains Mono, monospace" font-size="10.5" fill="rgba(255,255,255,0.8)" text-anchor="middle">ProductoServlet</text>
    <line x1="10" y1="55" x2="150" y2="55" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="80" y="75" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(255,255,255,0.95)" text-anchor="middle">doPost()</text>
    <text x="80" y="90" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(255,255,255,0.95)" text-anchor="middle">guardarProducto()</text>
  </g>
  
  <!-- Flecha 3→4 -->
  <g>
    <line x1="530" y1="190" x2="530" y2="240" stroke="#4a2c8a" stroke-width="2"/>
    <polygon points="530,240 525,230 535,230" fill="#4a2c8a"/>
    <text x="545" y="220" font-family="Inter, sans-serif" font-size="11" fill="#6b7e78">invoca</text>
  </g>
  
  <!-- Paso 4: DAO -->
  <g transform="translate(450, 240)">
    <rect x="0" y="0" width="160" height="110" rx="12" fill="#0284c7" filter="url(#shadow3)"/>
    <text x="80" y="25" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">4. DAO</text>
    <text x="80" y="45" font-family="JetBrains Mono, monospace" font-size="10.5" fill="rgba(255,255,255,0.8)" text-anchor="middle">ProductoDAO</text>
    <line x1="10" y1="55" x2="150" y2="55" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="80" y="75" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(255,255,255,0.95)" text-anchor="middle">insertar(producto)</text>
    <text x="80" y="90" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(255,255,255,0.95)" text-anchor="middle">PreparedStatement</text>
  </g>
  
  <!-- Flecha 4→5 -->
  <g>
    <line x1="530" y1="350" x2="530" y2="400" stroke="#0284c7" stroke-width="2"/>
    <polygon points="530,400 525,390 535,390" fill="#0284c7"/>
    <text x="545" y="380" font-family="Inter, sans-serif" font-size="11" fill="#6b7e78">SQL</text>
  </g>
  
  <!-- Paso 5: Base de Datos -->
  <g transform="translate(430, 400)">
    <ellipse cx="100" cy="18" rx="100" ry="18" fill="#336791" filter="url(#shadow3)"/>
    <rect x="0" y="18" width="200" height="55" fill="#336791"/>
    <ellipse cx="100" cy="73" rx="100" ry="18" fill="#1d4e89"/>
    <text x="100" y="45" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">5. PostgreSQL</text>
    <text x="100" y="62" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">INSERT INTO productos</text>
  </g>
  
  <!-- Flecha retorno 5→6 -->
  <g>
    <path d="M 630 445 Q 710 445 710 325 Q 710 215 770 215" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="5,5"/>
    <polygon points="770,215 760,210 760,220" fill="#16a34a"/>
    <text x="720" y="325" font-family="Inter, sans-serif" font-size="11" fill="#16a34a" font-weight="600" text-anchor="middle">rows affected</text>
  </g>
  
  <!-- Paso 6: Retorno al Controlador -->
  <g transform="translate(770, 160)">
    <rect x="0" y="0" width="160" height="110" rx="12" fill="#4a2c8a" filter="url(#shadow3)" opacity="0.85"/>
    <text x="80" y="25" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">6. Controlador</text>
    <text x="80" y="45" font-family="JetBrains Mono, monospace" font-size="10.5" fill="rgba(255,255,255,0.8)" text-anchor="middle">ProductoServlet</text>
    <line x1="10" y1="55" x2="150" y2="55" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="80" y="75" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(255,255,255,0.95)" text-anchor="middle">sendRedirect()</text>
    <text x="80" y="90" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(255,255,255,0.95)" text-anchor="middle">URL: /productos</text>
  </g>
  
  <!-- Flecha 6→7 -->
  <g>
    <line x1="850" y1="270" x2="850" y2="320" stroke="#4a2c8a" stroke-width="2"/>
    <polygon points="850,320 845,310 855,310" fill="#4a2c8a"/>
    <text x="860" y="300" font-family="Inter, sans-serif" font-size="11" fill="#6b7e78">redirect</text>
  </g>
  
  <!-- Paso 7: Lista productos -->
  <g transform="translate(770, 320)">
    <rect x="0" y="0" width="160" height="110" rx="12" fill="#00664a" filter="url(#shadow3)"/>
    <text x="80" y="25" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">7. Vista Lista</text>
    <text x="80" y="45" font-family="JetBrains Mono, monospace" font-size="10.5" fill="rgba(255,255,255,0.8)" text-anchor="middle">lista.jsp</text>
    <line x1="10" y1="55" x2="150" y2="55" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="80" y="75" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(255,255,255,0.95)" text-anchor="middle">&lt;c:forEach items=</text>
    <text x="80" y="90" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(255,255,255,0.95)" text-anchor="middle">"${productos}"&gt;</text>
  </g>
  
  <!-- Flecha 7→8 -->
  <g>
    <line x1="770" y1="375" x2="730" y2="375" stroke="#00664a" stroke-width="2"/>
    <polygon points="730,375 740,370 740,380" fill="#00664a"/>
    <text x="750" y="365" font-family="Inter, sans-serif" font-size="11" fill="#6b7e78" text-anchor="middle">HTML</text>
  </g>
  
  <!-- Paso 8: Navegador -->
  <g transform="translate(570, 320)">
    <rect x="0" y="0" width="160" height="110" rx="12" fill="#f0f4f2" stroke="#00664a" stroke-width="2" filter="url(#shadow3)"/>
    <rect x="10" y="12" width="140" height="15" rx="3" fill="#e0e8e4"/>
    <circle cx="20" cy="19" r="3.5" fill="#dc2626"/>
    <circle cx="32" cy="19" r="3.5" fill="#f59e0b"/>
    <circle cx="44" cy="19" r="3.5" fill="#16a34a"/>
    <text x="80" y="55" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1a2e28" text-anchor="middle">8. Navegador</text>
    <text x="80" y="78" font-family="Inter, sans-serif" font-size="10" fill="#6b7e78" text-anchor="middle">Muestra tabla</text>
    <text x="80" y="92" font-family="Inter, sans-serif" font-size="10" fill="#6b7e78" text-anchor="middle">actualizada</text>
  </g>
  
  <!-- Flecha 8→9 -->
  <g>
    <line x1="570" y1="375" x2="530" y2="375" stroke="#00664a" stroke-width="2"/>
    <polygon points="530,375 540,370 540,380" fill="#00664a"/>
  </g>
  
  <!-- Paso 9: Usuario ve resultado -->
  <g transform="translate(370, 320)">
    <rect x="0" y="0" width="160" height="110" rx="12" fill="#f0f4f2" stroke="#00664a" stroke-width="2" filter="url(#shadow3)"/>
    <circle cx="80" cy="38" r="18" fill="#00664a"/>
    <path d="M 60 63 Q 80 53 100 63" fill="#00664a"/>
    <text x="80" y="90" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1a2e28" text-anchor="middle">9. Usuario</text>
    <text x="80" y="103" font-family="Inter, sans-serif" font-size="10" fill="#6b7e78" text-anchor="middle">Ve producto nuevo</text>
  </g>
  
  <!-- Resumen del flujo -->
  <g transform="translate(30, 535)">
    <rect x="0" y="0" width="940" height="60" rx="10" fill="#f8faf9" stroke="#e0e8e4" stroke-width="1.2"/>
    <text x="20" y="22" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1a2e28">Resumen del Flujo:</text>
    <text x="20" y="42" font-family="Inter, sans-serif" font-size="11.5" fill="#6b7e78">Usuario → Vista (formulario) → Controlador (Servlet) → DAO (JDBC) → BD (INSERT) → Controlador (redirect) → Vista (lista) → Navegador (HTML) → Usuario</text>
  </g>
</svg>
