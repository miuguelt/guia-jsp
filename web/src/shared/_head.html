        <script>    window.onerror = function(message, source, lineno, colno, error) {        var errDiv = document.getElementById('js-debug-error');        if (!errDiv) {            errDiv = document.createElement('div');            errDiv.id = 'js-debug-error';            errDiv.style.position = 'fixed';            errDiv.style.top = '0';            errDiv.style.left = '0';            errDiv.style.width = '100%';            errDiv.style.background = '#ffebee';            errDiv.style.color = '#c62828';            errDiv.style.borderBottom = '3px solid #d32f2f';            errDiv.style.padding = '14px 20px';            errDiv.style.zIndex = '999999';            errDiv.style.fontFamily = 'monospace';            errDiv.style.fontSize = '0.9rem';            errDiv.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';            errDiv.style.display = 'flex';            errDiv.style.justifyContent = 'space-between';            errDiv.style.alignItems = 'center';            errDiv.innerHTML = '<div style="flex:1;"><strong>⚠️ Error de JavaScript Detectado:</strong> <span id="js-err-msg"></span><br><small style="color:#757575;" id="js-err-loc"></small></div><button onclick="this.parentElement.remove()" style="background:#d32f2f;color:white;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-weight:bold;">Cerrar</button>';            document.documentElement.appendChild(errDiv);        }        document.getElementById('js-err-msg').textContent = message;        document.getElementById('js-err-loc').textContent = 'Archivo: ' + source + ' | Línea: ' + lineno + ' | Columna: ' + colno;    };    </script>
