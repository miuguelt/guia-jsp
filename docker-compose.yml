# ============================================
# DOCKER COMPOSE - SISTEMA DE INVENTARIO MVC
# Uso: docker compose up -d
# Nota: Requiere una BD PostgreSQL externa.
# Configurar vía DATABASE_URL (formato: postgresql://user:pass@host:port/dbname)
# ============================================

services:

  # ---- Aplicación Java (Tomcat + WAR) ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventario-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@127.0.0.1:5434/inventario_db}
